connector.name=tdf_postgresql

# PostgreSQL connection — points to the COP database
connection-url=jdbc:postgresql://local-dsp.virtru.com:15432/postgres
connection-user=postgres
connection-password=changeme

# DSP Platform endpoint
tdf.platform.endpoint=local-dsp.virtru.com:8080
tdf.trusted-certs-directory=/etc/trino/certs
tdf.platform.entityIdentifierMode=USERNAME

# Client credentials for entitlement calls (opentdf client from Keycloak)
tdf.entitlements.credentials=opentdf:secret
tdf.rewrap.credentials=opentdf-sdk:secret
